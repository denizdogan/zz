name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ELP_VERSION: "2026-02-27"
  REBAR3_VERSION: "3.24.0"

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "27"
            elp_otp: "27.3"
          - otp: "28"
            elp_otp: "28"

    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Cache _build
        uses: actions/cache@v6
        with:
          path: _build
          key: ${{ runner.os }}-otp${{ matrix.otp }}-build-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-build-

      - name: Cache dialyzer PLT
        uses: actions/cache@v6
        with:
          path: ~/.cache/rebar3
          key: ${{ runner.os }}-otp${{ matrix.otp }}-plt-${{ hashFiles('rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-plt-

      - name: Compile
        run: rebar3 compile

      - name: Format check
        run: rebar3 fmt --check

      - name: EUnit
        run: rebar3 as test do eunit --cover

      - name: PropEr
        run: rebar3 as test do proper

      - name: Coverage
        run: rebar3 as test do cover --verbose, codecov analyze

      - name: Upload coverage to Codecov
        if: matrix.otp == '28'
        uses: codecov/codecov-action@v7
        with:
          files: codecov.json
          fail_ci_if_error: false
          use_oidc: true

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Install elp
        run: |
          curl -fsSL -o /tmp/elp.tar.gz \
            "https://github.com/WhatsApp/erlang-language-platform/releases/download/${ELP_VERSION}/elp-linux-x86_64-unknown-linux-gnu-otp-${{ matrix.elp_otp }}.tar.gz"
          tar xzf /tmp/elp.tar.gz -C /usr/local/bin
          elp version

      - name: Eqwalizer
        run: elp eqwalize-all
