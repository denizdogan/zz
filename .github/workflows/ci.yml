name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ELP_VERSION: "2026-06-10"
  REBAR3_VERSION: "3.27.0"

jobs:
  test:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        otp: ["27", "28", "29"]

    steps:
      - uses: actions/checkout@v7

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Cache _build
        if: ${{ !env.ACT }}
        uses: actions/cache@v6
        with:
          path: _build
          key: ${{ runner.os }}-otp${{ matrix.otp }}-build-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-build-

      - name: Cache dialyzer PLT
        if: ${{ !env.ACT }}
        uses: actions/cache@v6
        with:
          path: ~/.cache/rebar3
          key: ${{ runner.os }}-otp${{ matrix.otp }}-plt-${{ hashFiles('rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp${{ matrix.otp }}-plt-

      - name: Compile
        run: rebar3 compile

      - name: Format check
        run: rebar3 fmt --check

      - name: Documentation
        if: matrix.otp == '28'
        run: rebar3 ex_doc

      - name: EUnit
        run: rebar3 as test do eunit --cover

      - name: PropEr
        run: rebar3 as test do proper

      - name: Coverage
        run: rebar3 as test do cover --verbose, codecov analyze

      - name: Upload coverage to Codecov
        if: matrix.otp == '29' && !env.ACT
        uses: codecov/codecov-action@v7
        with:
          files: codecov.json
          fail_ci_if_error: false
          use_oidc: true

      - name: Dialyzer
        run: rebar3 dialyzer

      # ELP 2026-06-10 has no OTP 29 artifact, and Eqwalizer currently fails
      # against OTP 29-generated stdlib artifacts. Track upstream support:
      # https://github.com/WhatsApp/erlang-language-platform/issues/214
      - name: Install elp
        if: matrix.otp == '28'
        run: |
          ELP_ARCH=$(uname -m)
          curl -fsSL -o /tmp/elp.tar.gz \
            "https://github.com/WhatsApp/erlang-language-platform/releases/download/${ELP_VERSION}/elp-linux-${ELP_ARCH}-unknown-linux-gnu-otp-${{ matrix.otp }}.tar.gz"
          tar xzf /tmp/elp.tar.gz -C /usr/local/bin
          elp version

      - name: Eqwalizer
        if: matrix.otp == '28'
        run: elp eqwalize-all
