[tools]
erlang = "28.5"
rebar = "3.27.0"
act = "0.2.89"
actionlint = "1.7.12"
"github:WhatsApp/erlang-language-platform" = { version = "2026-06-10", matching = "otp-28.tar.gz", bin = "elp" }

[tasks.compile]
run = "rebar3 compile"

[tasks.clean]
run = "rebar3 clean"

[tasks.format]
run = "rebar3 fmt"

[tasks.format-check]
run = "rebar3 fmt --check"

[tasks.test]
run = "mise eunit && mise prop"

[tasks.eunit]
run = "rebar3 as test do eunit"

[tasks.prop]
run = "rebar3 as test do proper"

[tasks.dialyzer]
run = "rebar3 dialyzer"

[tasks.docs]
run = "rebar3 ex_doc"

[tasks.check]
run = """
rebar3 compile
rebar3 fmt --check
rebar3 as test do eunit
rebar3 as test do proper
rebar3 dialyzer
env -u ELP_EQWALIZER_PATH elp eqwalize-all
"""

[tasks.ci-local]
description = "Validate workflows and run the complete CI matrix in Docker"
run = """
actionlint && act pull_request \
    --workflows .github/workflows/ci.yml \
    --job test \
    --platform ubuntu-24.04=catthehacker/ubuntu:act-24.04
"""

[tasks.publish]
description = "Publish to Hex and tag the release"
run = """
set -e
git diff --quiet || { echo "Working tree dirty — commit or stash first."; exit 1; }
git diff --cached --quiet || { echo "Staged changes uncommitted."; exit 1; }
VERSION=$(awk -F'"' '/vsn,/ {print $2}' src/zz.app.src)
[ -n "$VERSION" ] || { echo "Could not read vsn from src/zz.app.src"; exit 1; }
echo "Publishing zz $VERSION..."
rebar3 hex publish
git tag "v$VERSION"
git push origin "v$VERSION"
echo "Released v$VERSION"
"""

[tasks.eq]
run = "env -u ELP_EQWALIZER_PATH elp eqwalize"

[tasks.eq-all]
run = "env -u ELP_EQWALIZER_PATH elp eqwalize-all"

[tasks.erl]
run = "rebar3 shell"

[tasks.bench]
description = "Run the zz_bench micro-benchmarks"
run = """
rebar3 as test compile
erl -noshell -noinput \\
    -pa _build/test/lib/zz/ebin \\
    -pa _build/test/lib/zz/test \\
    -eval "zz_bench:run(), halt()."
"""

[tasks.cover]
run = """
rebar3 as test do eunit --cover --cover_export_name=suite1
rebar3 as test do cover --verbose
open ./_build/test/cover/aggregate/zz.html
"""
