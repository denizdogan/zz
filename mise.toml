[settings]
lockfile = true

[tools]
erlang = "28.5.0.3"
rebar = "3.27.0"
act = "0.2.89"
actionlint = "1.7.12"
"github:WhatsApp/erlang-language-platform" = { version = "2026-06-10", matching = "otp-28.tar.gz", bin = "elp" }

[tasks.compile]
run = "rebar3 compile"

[tasks.clean]
run = "rebar3 clean"

[tasks.format]
run = "rebar3 fmt"

[tasks.format-check]
run = "rebar3 fmt --check"

[tasks.test]
run = "mise eunit && mise prop"

[tasks.eunit]
run = "rebar3 as test do eunit"

[tasks.prop]
run = "rebar3 as test do proper"

[tasks.dialyzer]
run = "rebar3 dialyzer"

[tasks.docs]
run = "rebar3 ex_doc"

[tasks.check]
run = """
rebar3 compile
rebar3 fmt --check
rebar3 as test do eunit
rebar3 as test do proper
rebar3 dialyzer
env -u ELP_EQWALIZER_PATH elp eqwalize-all
"""

[tasks.ci-local]
description = "Validate workflows and run the complete CI matrix in Docker"
run = """
actionlint && act pull_request \
    --workflows .github/workflows/ci.yml \
    --job test \
    --platform ubuntu-24.04=catthehacker/ubuntu:act-24.04
"""

[tasks.publish]
description = "Validate, tag, and publish the release"
run = """
set -eu

[ -z "$(git status --porcelain)" ] || {
    echo "Working tree dirty — commit or stash all changes first."
    exit 1
}

BRANCH=$(git branch --show-current)
[ "$BRANCH" = "main" ] || {
    echo "Releases must be published from main, not $BRANCH."
    exit 1
}

UPSTREAM=$(git rev-parse --abbrev-ref --symbolic-full-name '@{u}' 2>/dev/null || true)
[ "$UPSTREAM" = "origin/main" ] || {
    echo "main must track origin/main; found ${UPSTREAM:-no upstream}."
    exit 1
}

git fetch --quiet origin main --tags
HEAD=$(git rev-parse HEAD)
REMOTE_HEAD=$(git rev-parse origin/main)
[ "$HEAD" = "$REMOTE_HEAD" ] || {
    echo "Local main must be synchronized with origin/main."
    exit 1
}

VERSION=$(awk -F'"' '/vsn,/ {print $2}' src/zz.app.src)
[ -n "$VERSION" ] || {
    echo "Could not read vsn from src/zz.app.src."
    exit 1
}
TAG="v$VERSION"

grep -Fq "{zz, \\\"$VERSION\\\"}" README.md || {
    echo "README.md does not reference zz $VERSION."
    exit 1
}
grep -Fq "## [$VERSION] -" CHANGELOG.md || {
    echo "CHANGELOG.md has no release heading for $VERSION."
    exit 1
}
grep -Fq "[$VERSION]:" CHANGELOG.md || {
    echo "CHANGELOG.md has no link for $VERSION."
    exit 1
}

if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
    echo "Local tag $TAG already exists."
    exit 1
fi
if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
    echo "Remote tag $TAG already exists."
    exit 1
fi

echo "Validating zz $VERSION..."
mise check
rebar3 hex build

echo "Creating and pushing $TAG..."
git tag "$TAG"
git push origin "$TAG"

echo "Publishing zz $VERSION to Hex..."
if ! rebar3 hex publish; then
    echo "Hex publish failed after $TAG was pushed; fix the issue and retry with rebar3 hex publish."
    exit 1
fi

echo "Released $TAG"
"""

[tasks.eq]
run = "env -u ELP_EQWALIZER_PATH elp eqwalize"

[tasks.eq-all]
run = "env -u ELP_EQWALIZER_PATH elp eqwalize-all"

[tasks.erl]
run = "rebar3 shell"

[tasks.bench]
description = "Run the zz_bench micro-benchmarks"
run = """
rebar3 as test compile
erl -noshell -noinput \\
    -pa _build/test/lib/zz/ebin \\
    -pa _build/test/lib/zz/test \\
    -eval "zz_bench:run(), halt()."
"""

[tasks.cover]
run = """
rebar3 as test do eunit --cover --cover_export_name=suite1
rebar3 as test do cover --verbose
open ./_build/test/cover/aggregate/zz.html
"""
